<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            color: #333;
            padding: 30px 15px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2rem;
            color: #2c3e50;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        nav {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            justify-content: center;
        }
        nav a {
            padding: 9px 22px;
            background: #fff;
            border: 2px solid #3498db;
            color: #3498db;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active {
            background: #3498db;
            color: #fff;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d7de;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafbfc;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            background: #fff;
        }
        textarea { resize: vertical; min-height: 90px; }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            color: #444;
            cursor: pointer;
            background: #f0f4f8;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1.5px solid #d0d7de;
            transition: all 0.2s;
        }
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .checkbox-group label:has(input:checked) {
            background: #ebf5fb;
            border-color: #3498db;
            color: #2980b9;
        }
        .hint { font-size: 0.8rem; color: #888; margin-top: 4px; }
        .row { display: flex; gap: 16px; }
        .row .form-group { flex: 1; }
        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button[type="submit"]:hover { background: #2176ae; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Трекер привычек</h1>
    <p class="subtitle">Добавьте новую привычку для отслеживания</p>

    <nav>
        <a href="index.html" class="active">➕ Добавить</a>
        <a href="list.php">📊 Все привычки</a>
    </nav>

    <div class="card">
        <form action="save.php" method="POST">

            <div class="form-group">
                <label for="name">Название привычки *</label>
                <input type="text" id="name" name="name"
                       placeholder="Например: Ежедневная зарядка"
                       required minlength="3" maxlength="100">
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description"
                          placeholder="Опишите привычку подробнее: что именно, как, зачем..."
                          maxlength="1000"></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="category">Категория *</label>
                    <select id="category" name="category" required>
                        <option value="">— выберите —</option>
                        <option value="health">🏃 Здоровье</option>
                        <option value="sport">💪 Спорт</option>
                        <option value="education">📚 Образование</option>
                        <option value="productivity">⚡ Продуктивность</option>
                        <option value="mindfulness">🧘 Осознанность</option>
                        <option value="social">🤝 Социальное</option>
                        <option value="finance">💰 Финансы</option>
                        <option value="other">🔖 Другое</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="difficulty">Сложность *</label>
                    <select id="difficulty" name="difficulty" required>
                        <option value="">— выберите —</option>
                        <option value="easy">🟢 Лёгкая</option>
                        <option value="medium">🟡 Средняя</option>
                        <option value="hard">🔴 Сложная</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="start_date">Дата начала *</label>
                    <input type="date" id="start_date" name="start_date" required>
                </div>

                <div class="form-group">
                    <label for="goal_days">Цель (дней) *</label>
                    <input type="number" id="goal_days" name="goal_days"
                           min="1" max="365" placeholder="21" required>
                    <p class="hint">Сколько дней хотите выполнять привычку</p>
                </div>
            </div>

            <div class="form-group">
                <label>Дни выполнения *</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="days[]" value="mon"> Пн</label>
                    <label><input type="checkbox" name="days[]" value="tue"> Вт</label>
                    <label><input type="checkbox" name="days[]" value="wed"> Ср</label>
                    <label><input type="checkbox" name="days[]" value="thu"> Чт</label>
                    <label><input type="checkbox" name="days[]" value="fri"> Пт</label>
                    <label><input type="checkbox" name="days[]" value="sat"> Сб</label>
                    <label><input type="checkbox" name="days[]" value="sun"> Вс</label>
                </div>
                <p class="hint">Выберите хотя бы один день</p>
            </div>

            <button type="submit">Сохранить привычку</button>
        </form>
    </div>
</div>
</body>
</html>
